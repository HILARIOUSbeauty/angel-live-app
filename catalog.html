<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ANGEL LIVE｜ごほうびカタログ</title>
<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF7F4;--card:#fff;--rose:#B96B79;--rose-d:#9d5563;--gold:#C9A96A;--ink:#4A3F3D;--sub:#A89A94;--line:#F5EBE7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;font-size:15px;line-height:1.6;padding-bottom:60px}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.brandmk{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;letter-spacing:.06em;color:var(--rose-d)}
.tag{font-size:11px;color:var(--sub);letter-spacing:.14em;margin-bottom:12px}
.ptpill{background:linear-gradient(135deg,#CE8996,var(--rose-d));color:#fff;border-radius:999px;padding:7px 16px;font-weight:700;font-size:14px;box-shadow:0 3px 10px rgba(185,107,121,.3)}
.ptpill small{font-weight:400;font-size:10px;opacity:.85;margin-right:2px}
/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 0 10px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1.5px solid var(--rose);background:#fff;color:var(--rose-d);border-radius:999px;padding:7px 15px;font:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.chip.on{background:linear-gradient(135deg,#CE8996,var(--rose-d));color:#fff;border-color:transparent}
.ctrls{display:flex;gap:8px;margin-bottom:12px}
.ctrls select{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:9px 10px;font:inherit;font-size:13px;background:#fff;color:var(--ink)}
/* grid */
.bhead{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin:14px 2px 6px;display:flex;align-items:center;gap:8px}
.bhead::after{content:"";flex:1;height:1px;background:var(--line)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(185,107,121,.05)}
.item img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;border-radius:12px;margin-bottom:8px}
.item .noimg{width:100%;aspect-ratio:1;border-radius:12px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--sub);margin-bottom:8px}
.item .bd{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.05em}
.item .nm{font-size:12px;font-weight:500;line-height:1.45;flex:1;margin:2px 0 8px}
.item .row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.item .pt{font-weight:700;color:var(--rose-d);font-size:15px}
.item .pt small{font-size:10px;font-weight:400}
.item button{border:none;border-radius:999px;padding:7px 13px;font:inherit;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#CE8996,var(--rose-d));cursor:pointer}
.item button:disabled{background:var(--line);color:var(--sub)}
.empty{text-align:center;color:var(--sub);font-size:13px;padding:40px 0}
/* login */
.center{min-height:75vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;width:100%;max-width:320px}
.card .t{font-size:15px;font-weight:700;color:var(--rose-d);margin-bottom:10px;text-align:center}
label.fl{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:14px}
.btn{display:block;width:100%;border:none;border-radius:999px;padding:12px;font:inherit;font-weight:700;font-size:15px;color:#fff;background:linear-gradient(135deg,#CE8996,var(--rose-d));cursor:pointer;margin-top:14px}
.hint{font-size:11.5px;color:var(--sub);margin-top:8px;text-align:center}
.hist{margin-top:22px}
.hist .t{font-size:13px;font-weight:700;color:var(--rose-d);margin-bottom:6px}
.hrow{display:flex;justify-content:space-between;font-size:12px;padding:7px 2px;border-bottom:1px solid var(--line);color:var(--sub)}
.hrow b{color:var(--ink);font-weight:500;flex:1;margin-right:8px}
.st{color:var(--gold);font-weight:700;flex:none}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9;max-width:90%;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="brandmk">ANGEL LIVE</div>
      <div class="tag">REWARD CATALOGUE</div>
    </div>
    <div class="ptpill" id="ptPill" style="display:none"><small>保有</small><span id="ptVal">0</span>pt</div>
  </div>

  <div id="gate" class="center" style="display:none">
    <div class="card">
      <div class="t">ログイン</div>
      <label class="fl">TikTok ID（@なしでOK）<input id="lgId" autocapitalize="none"></label>
      <label class="fl">パスワード<input id="lgPw" type="password"></label>
      <button class="btn" id="lgBtn">カタログを見る</button>
      <div class="hint">マイページと同じID・パスワードやで</div>
    </div>
  </div>

  <div id="app" style="display:none">
    <div class="chips" id="chips"></div>
    <div class="ctrls">
      <select id="subSel"></select>
      <select id="sortSel">
        <option value="brand">メーカー順</option>
        <option value="ptasc">pt低い順</option>
        <option value="ptdesc">pt高い順</option>
        <option value="new">新着順</option>
      </select>
    </div>
    <div id="list"></div>
    <div class="hist" id="hist" style="display:none">
      <div class="t">最近の申請</div>
      <div id="histRows"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const cfg=window.APP_CONFIG||{};
const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)};
const CAT_ORDER=['スキンケア','ヘアケア','コスメ','フレグランス','ネイル','美容家電','バス&ボディ','ギフト券&体験'];
const DEF_CFG={ptPerHour:10,ptPer1000Dia:3,maxMinPerLog:180,minDiaForTime:1000,weeklyTiers:[[20,100],[30,100],[40,100],[50,200]],monthlyTiers:[[90,300],[110,200],[150,500]],referralPt:500};

let liver=null,isAdmin=false,items=[],reds=[],balance=0,curCat=null;

// ---- 残高計算（本体アプリと同じ式を移植） ----
const gc=t=>{const e=new Date(t+"T00:00:00"),r=(e.getDay()+6)%7;e.setDate(e.getDate()-r);return e.toISOString().slice(0,10)};
function calcBalance(logs,adjs,redsArr,n){
  let s=0,i=0;const a={},o={};
  (logs||[]).forEach(S=>{
    const g=Number(S.diamonds)||0,p=Number(S.minutes)||0;
    i+=g;
    if(g>=n.minDiaForTime)s+=Math.min(p,n.maxMinPerLog);
    if(S.date){a[gc(S.date)]=(a[gc(S.date)]||0)+p;const m=String(S.date).slice(0,7);o[m]=(o[m]||0)+p}
  });
  const l=Math.floor(s/60)*n.ptPerHour,u=Math.floor(i/1000)*n.ptPer1000Dia;
  const d=(S,g)=>(g||[]).reduce((p,[m,_])=>S>=m?p+_:p,0);
  const h=Object.values(a).reduce((S,g)=>S+d(g/60,n.weeklyTiers),0);
  const f=Object.values(o).reduce((S,g)=>S+d(g/60,n.monthlyTiers),0);
  const v=(adjs||[]).reduce((S,g)=>S+(Number(g.pt)||0),0);
  const y=(redsArr||[]).reduce((S,g)=>S+(Number(g.pt)||0),0);
  return l+u+h+f+v-y;
}

const pickBrand=n=>(n||'').replace(/^【[^】]*】/,'').trim().split(/[\s　]+/)[0].slice(0,20);

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){$('gate').style.display='flex';return}
  const uid=session.user.id;
  const [lv,adm,cat]=await Promise.all([
    sb.from('livers').select('*').eq('id',uid).maybeSingle(),
    sb.from('admins').select('user_id').eq('user_id',uid).maybeSingle(),
    sb.from('catalog').select('*').order('created_at',{ascending:false})
  ]);
  liver=lv.data||null;isAdmin=!!adm.data;
  items=(cat.data||[]).map(r=>({...r,brand:r.brand||pickBrand(r.name),subcat:r.subcat||'その他'}));
  if(liver){
    const [cf,lg,aj,rd]=await Promise.all([
      sb.from('config').select('data').eq('id',1).maybeSingle(),
      sb.from('logs').select('*').eq('liver_id',liver.id),
      sb.from('adjustments').select('*').eq('liver_id',liver.id),
      sb.from('redemptions').select('*').eq('liver_id',liver.id).order('created_at',{ascending:false})
    ]);
    reds=rd.data||[];
    balance=calcBalance(lg.data||[],aj.data||[],reds,{...DEF_CFG,...((cf.data&&cf.data.data)||{})});
    $('ptVal').textContent=balance.toLocaleString();
    $('ptPill').style.display='block';
    renderHist();
  }
  $('gate').style.display='none';$('app').style.display='block';
  renderChips();
}

$('lgBtn').onclick=async()=>{
  const raw=$('lgId').value.trim();
  const email=raw.includes('@')&&raw.includes('.')?raw:`${raw.replace(/^@/,'').toLowerCase()}@liver.angellive.app`;
  const {error}=await sb.auth.signInWithPassword({email,password:$('lgPw').value});
  if(error){toast('ログインできへんかった: '+error.message);return}
  boot();
};

function cats(){
  const set=[...new Set(items.map(r=>r.cat).filter(Boolean))];
  return set.sort((a,b)=>{
    const ia=CAT_ORDER.indexOf(a),ib=CAT_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib)||a.localeCompare(b,'ja');
  });
}
function renderChips(){
  const cs=cats();
  if(!curCat)curCat=cs[0]||null;
  $('chips').innerHTML=cs.map(c=>`<button class="chip ${c===curCat?'on':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
  renderSub();
}
function setCat(c){curCat=c;renderChips()}
window.setCat=setCat;

function renderSub(){
  const subs=[...new Set(items.filter(r=>r.cat===curCat).map(r=>r.subcat))].sort((a,b)=>a==='その他'?1:b==='その他'?-1:a.localeCompare(b,'ja'));
  $('subSel').innerHTML=`<option value="">すべて</option>`+subs.map(s=>`<option>${s}</option>`).join('');
  $('sortSel').value=localStorage.getItem('al_sort_'+curCat)||'brand';
  renderList();
}
$('subSel').onchange=renderList;
$('sortSel').onchange=()=>{localStorage.setItem('al_sort_'+curCat,$('sortSel').value);renderList()};

function renderList(){
  const sub=$('subSel').value,mode=$('sortSel').value;
  let list=items.filter(r=>r.cat===curCat&&(!sub||r.subcat===sub));
  if(mode==='ptasc')list.sort((a,b)=>a.pt-b.pt);
  else if(mode==='ptdesc')list.sort((a,b)=>b.pt-a.pt);
  else if(mode==='new')list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  else list.sort((a,b)=>a.brand.localeCompare(b.brand,'ja')||a.pt-b.pt);
  if(!list.length){$('list').innerHTML='<div class="empty">このカテゴリはまだ準備中やで</div>';return}

  const card=r=>`
  <div class="item">
    ${r.img?`<img src="${r.img}" loading="lazy">`:`<div class="noimg">COMING SOON</div>`}
    <div class="bd">${r.brand||''}</div>
    <div class="nm">${r.name}</div>
    <div class="row">
      <div class="pt">${Number(r.pt).toLocaleString()}<small>pt</small></div>
      ${liver?`<button ${balance<r.pt?'disabled':''} onclick="redeem(${r.id})">${balance<r.pt?'pt不足':'申請'}</button>`:''}
    </div>
  </div>`;

  if(mode==='brand'){
    let html='',cur=null,buf=[];
    const flush=()=>{if(buf.length)html+=`<div class="bhead">${cur}</div><div class="grid">${buf.join('')}</div>`;buf=[]};
    for(const r of list){if(r.brand!==cur){flush();cur=r.brand}buf.push(card(r))}
    flush();
    $('list').innerHTML=html;
  }else{
    $('list').innerHTML=`<div class="grid">${list.map(card).join('')}</div>`;
  }
}

async function redeem(id){
  const r=items.find(x=>x.id===id);
  if(!r||!liver)return;
  if(balance<r.pt){toast('ポイントが足りへん…あと'+(r.pt-balance)+'pt！');return}
  if(!confirm(`「${r.name}」を ${r.pt}pt で申請する？`))return;
  const {error}=await sb.from('redemptions').insert({liver_id:liver.id,item_name:r.name,pt:r.pt});
  if(error){toast('申請エラー: '+error.message);return}
  balance-=r.pt;
  reds.unshift({item_name:r.name,pt:r.pt,status:'申請中',created_at:new Date().toISOString()});
  $('ptVal').textContent=balance.toLocaleString();
  renderHist();renderList();
  toast('申請完了！運営が確認して発送するで 🎁');
}
window.redeem=redeem;

function renderHist(){
  if(!reds.length){$('hist').style.display='none';return}
  $('hist').style.display='block';
  $('histRows').innerHTML=reds.slice(0,5).map(r=>`
    <div class="hrow"><b>${r.item_name}</b><span>${r.pt}pt</span><span class="st">　${r.status||'申請中'}</span></div>`).join('');
}

boot();
</script>
</body>
</html>
