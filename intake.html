<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ANGEL LIVE｜入荷</title>
<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF7F4;--rose:#B96B79;--rose-d:#9d5563;--ink:#4A3F3D;--sub:#A89A94;--line:#F5EBE7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;font-size:15px;padding:24px 16px;max-width:560px;margin:0 auto}
h1{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--rose-d);letter-spacing:.05em}
.tag{font-size:11px;color:var(--sub);letter-spacing:.14em;margin-bottom:20px}
.btn{display:block;width:100%;border:none;border-radius:999px;padding:15px;font:inherit;font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,#CE8996,var(--rose-d));cursor:pointer;margin:14px 0}
.btn:disabled{opacity:.5}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
.row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:flex-start}
.row .r{flex:none;max-width:55%}
.hint{font-size:12px;color:var(--sub);line-height:1.7}
#status{font-size:13px;color:var(--sub);text-align:center;min-height:20px}
</style>
</head>
<body>
<h1>Catalogue Intake</h1>
<div class="tag">ANGEL LIVE ｜ 入荷実行</div>
<div class="hint">SQLで積んだ入荷キューを処理する：画像を取得 → 白背景チェック → 保存 → カタログ登録。1回で最大20件。キューが多い時はもう一回押すだけ。</div>
<button class="btn" id="run">入荷を実行する</button>
<div id="status"></div>
<div class="card" id="reportCard" style="display:none"><div id="report"></div></div>
<script>
const cfg=window.APP_CONFIG||{};
const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
$('run').onclick=async()=>{
  $('run').disabled=true;$('status').textContent='処理中…(画像の数だけ数十秒かかる)';
  try{
    const {data,error}=await sb.functions.invoke('catalog-ingest',{body:{}});
    if(error)throw error;
    if(data.error)throw new Error(data.error);
    $('status').textContent=`処理件数：${data.processed}件`;
    $('reportCard').style.display='block';
    $('report').innerHTML=(data.report||[]).map(r=>`<div class="row"><div>${r.name}</div><div class="r">${r.result}</div></div>`).join('')||'<div class="hint">キューは空やで。SQLで商品を積んでから実行してな。</div>';
  }catch(e){$('status').textContent='エラー: '+(e.message||e)}
  $('run').disabled=false;
};
</script>
</body>
</html>
